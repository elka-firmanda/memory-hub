services:
  memory-hub:
    image: ghcr.io/elka-firmanda/memory-hub:latest
    container_name: memory-hub
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      MEMORY_HUB_DB: /data/memoryhub.sqlite
      # Set this in .env for internet-exposed deployments.
      MEMORY_HUB_TOKEN: ${MEMORY_HUB_TOKEN:-}
    volumes:
      - memory_hub_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  memory_hub_data:
